---
- name: Disable Windows Defender AntiSpyware (all Windows)
  ignore_errors: yes
  win_regedit:
    path: "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows Defender"
    name: DisableAntiSpyware
    type: dword
    data: 1

- name: Disable Real-Time Monitoring via registry (all Windows)
  ignore_errors: yes
  win_regedit:
    path: "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection"
    name: DisableRealtimeMonitoring
    type: dword
    data: 1

- name: Disable Behavior Monitoring via registry (all Windows)
  ignore_errors: yes
  win_regedit:
    path: "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection"
    name: DisableBehaviorMonitoring
    type: dword
    data: 1

- name: Disable On Access Protection via registry (all Windows)
  ignore_errors: yes
  win_regedit:
    path: "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection"
    name: DisableOnAccessProtection
    type: dword
    data: 1

- name: Disable Scan On Realtime Enable via registry (all Windows)
  ignore_errors: yes
  win_regedit:
    path: "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection"
    name: DisableScanOnRealtimeEnable
    type: dword
    data: 1

- name: Disable Windows Defender feature on Windows Server
  ignore_errors: yes
  win_shell: 'Uninstall-WindowsFeature -Name Windows-Defender'
  when: ansible_distribution is search("Windows Server")

- name: Disable Real-Time Monitoring via Set-MpPreference (immediate effect, Windows 10 only)
  ignore_errors: yes
  win_shell: 'Set-MpPreference -DisableRealtimeMonitoring $true'
  when: ansible_distribution is search("Windows 10")

- name: Stop Windows Defender service (Windows 10 only)
  ignore_errors: yes
  win_service:
    name: WinDefend
    state: stopped
    start_mode: disabled
  when: ansible_distribution is search("Windows 10")
