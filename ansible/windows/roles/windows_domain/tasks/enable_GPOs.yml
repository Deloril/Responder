- name: Create DisableWindowsUpdate GPO
  win_shell: New-GPO -Name "DisableWindowsUpdate" -ErrorAction SilentlyContinue

- name: Set NoAutoUpdate in GPO
  win_shell: Set-GPRegistryValue -Name "DisableWindowsUpdate" -Key "HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" -ValueName "NoAutoUpdate" -Type DWord -Value 1

- name: Set AUOptions to Never Check in GPO
  win_shell: Set-GPRegistryValue -Name "DisableWindowsUpdate" -Key "HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" -ValueName "AUOptions" -Type DWord -Value 1

- name: Disable Windows Update access in GPO
  win_shell: Set-GPRegistryValue -Name "DisableWindowsUpdate" -Key "HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate" -ValueName "DisableWindowsUpdateAccess" -Type DWord -Value 1

- name: Disable featured software notifications in GPO
  win_shell: Set-GPRegistryValue -Name "DisableWindowsUpdate" -Key "HKLM\SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU" -ValueName "EnableFeaturedSoftware" -Type DWord -Value 0

- name: Link DisableWindowsUpdate GPO
  win_shell: New-GPLink -Name "DisableWindowsUpdate" -Target "dc=tsg-internal,dc=lab" -LinkEnabled Yes -ErrorAction SilentlyContinue

- name: Set Permissions on DisableWindowsUpdate GPO
  win_shell: Set-GPPermission -Name "DisableWindowsUpdate" -TargetName "Domain Computers" -TargetType Group -PermissionLevel GpoApply

