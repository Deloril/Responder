---

- name: Copy over ADMX templates to DC
  win_copy:
    src: "Administrative Templates (.admx) for Windows 10 October 2018 Update.msi"
    dest: "C:\\Administrative Templates (.admx) for Windows 10 October 2018 Update.msi"

- name: install ADMX templates
  win_shell: msiexec /i "C:\\Administrative Templates (.admx) for Windows 10 October 2018 Update.msi" /quiet

- name: Add ADMX to central policy store
  win_shell: Copy-Item -Path "C:\\Program Files (x86)\\Microsoft Group Policy\\Windows 10 October 2018 Update (1809) v2\\PolicyDefinitions" -Destination \\tsg-internal.lab\SYSVOL\tsg-internal.lab\Policies\ -Force -Recurse

- name: Copy GPO
  win_copy:
    src: AdvancedLoggingGPO.zip
    dest: C:\AdvancedLoggingGPO.zip

- name: make GPO backup dir
  win_file:
    path: C:\AdvancedLoggingGPO
    state: directory

- name: unzip GPOs
  win_unzip:
    src: C:\AdvancedLoggingGPO.zip
    dest: C:\AdvancedLoggingGPO\
    delete_archive: yes

- name: Import GPOs
  win_shell: Import-Gpo -BackupGpoName AdvancedLoggingGPO -TargetName AdvancedLoggingGPO -Path C:\AdvancedLoggingGPO -CreateIfNeeded

- name: Link GPOs
  win_shell: New-GPLink -Name AdvancedLoggingGPO -Target "dc=tsg-internal,dc=lab" -LinkEnabled Yes

- name: Set Permissions on AdvancedLogging GPO
  win_shell: Set-GPPermission -Name AdvancedLoggingGPO -TargetName "Domain Computers" -TargetType Group -PermissionLevel GpoApply

- name: Copy WindowsDefenderDisable1809 GPO
  win_copy:
