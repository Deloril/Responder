# --- GPP Password in SYSVOL (cpassword vulnerability) ---

- name: Create fake GPO directory structure for legacy deployment GPP
  win_shell: |
    $GpoId = "{7E3F4B2A-1C9D-4A8E-B5F6-2D3E4F5A6B7C}"
    $BasePath = "C:\Windows\SYSVOL\domain\Policies\$GpoId\Machine\Preferences\Groups"
    New-Item -Path $BasePath -ItemType Directory -Force | Out-Null

    $AESKey = [byte[]](0x4e,0x99,0x06,0xe8,0xfc,0xb6,0x6c,0xc9,0xfa,0xf4,0x93,0x10,0x62,0x0f,0xfe,0xe8,0xf4,0x96,0xe8,0x06,0xcc,0x05,0x79,0x90,0x20,0x9b,0x09,0xa4,0x33,0xb6,0x6c,0x1b)
    $AES = New-Object System.Security.Cryptography.AesCryptoServiceProvider
    $AES.Mode = [System.Security.Cryptography.CipherMode]::CBC
    $AES.Padding = [System.Security.Cryptography.PaddingMode]::PKCS7
    $AES.BlockSize = 128
    $AES.KeySize = 256
    $AES.Key = $AESKey
    $AES.IV = New-Object byte[] 16
    $Encryptor = $AES.CreateEncryptor()
    $Bytes = [System.Text.Encoding]::Unicode.GetBytes("V4ult_Acc3ss!")
    $EncBytes = $Encryptor.TransformFinalBlock($Bytes, 0, $Bytes.Length)
    $CPassword = [Convert]::ToBase64String($EncBytes)

    $Xml = @"
    <?xml version="1.0" encoding="utf-8"?>
    <Groups clsid="{3125E937-EB16-4b4c-9934-544FC6D24D26}">
      <User clsid="{DF5F1855-51E5-4d24-8B1A-D9BDE98BA1D1}" name="svc_vault" image="2" changed="2025-08-14 11:32:07" uid="{A3F2B8C1-4D5E-6F7A-8B9C-0D1E2F3A4B5C}">
        <Properties action="U" newName="" fullName="Vault Service Account" description="Automated vault operations account" cpassword="$CPassword" changeLogon="0" noChange="1" neverExpires="1" acctDisabled="0" userName="TSG-INTERNAL\svc_vault"/>
      </User>
    </Groups>
    "@

    Set-Content -Path "$BasePath\Groups.xml" -Value $Xml -Encoding UTF8

# --- DNS records for internal services ---

- name: Add A record for web server in tsg-internal.lab DNS zone
  win_shell: >
    Add-DnsServerResourceRecordA
    -Name "web"
    -ZoneName "tsg-internal.lab"
    -IPv4Address "10.0.0.6"
    -ErrorAction SilentlyContinue
  ignore_errors: yes

- name: Add A record for mail server in tsg-internal.lab DNS zone
  win_shell: >
    Add-DnsServerResourceRecordA
    -Name "mail"
    -ZoneName "tsg-internal.lab"
    -IPv4Address "10.0.0.7"
    -ErrorAction SilentlyContinue
  ignore_errors: yes

- name: Add MX record for tsg-internal.lab pointing to mail server
  win_shell: >
    Add-DnsServerResourceRecordMX
    -Name "."
    -ZoneName "tsg-internal.lab"
    -MailExchange "mail.tsg-internal.lab"
    -Preference 10
    -ErrorAction SilentlyContinue
  ignore_errors: yes

# --- DNS zone for vaulttools.io (dangling domain -- extension supply chain attack) ---

- name: Create primary forward lookup zone for vaulttools.io
  win_shell: >
    Add-DnsServerPrimaryZone
    -Name "vaulttools.io"
    -ReplicationScope Domain
    -ErrorAction SilentlyContinue
  ignore_errors: yes

- name: Update GPOs
  win_shell: gpupdate /Force
