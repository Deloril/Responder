---
# Runs after all feature installations are complete.
# Disables Windows Update services that would interfere with
# Install-WindowsFeature if stopped earlier.

- hosts: all
  gather_facts: no
  tasks:

  - name: Block Windows Update access (safe now that all features are installed)
    win_regedit:
      path: "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate"
      name: DisableWindowsUpdateAccess
      type: dword
      data: 1

  - name: Stop and disable Windows Update service
    ignore_errors: yes
    win_service:
      name: wuauserv
      state: stopped
      start_mode: disabled

  - name: Stop and disable Windows Update Medic Service
    ignore_errors: yes
    win_service:
      name: WaaSMedicSvc
      state: stopped
      start_mode: disabled

  - name: Stop and disable Update Orchestrator Service
    ignore_errors: yes
    win_service:
      name: UsoSvc
      state: stopped
      start_mode: disabled
