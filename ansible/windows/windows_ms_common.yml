---
# Run windows_common role on member servers independently of the DC.
# This can start in parallel with the DC build since it has no AD dependency.

- hosts: ms
  gather_facts: yes
  strategy: free
  vars_files:
    - ./vars/member_server.yml
    - ./vars/domain.yml
    - ./vars/domain_users_and_groups.yml
  roles:
    - windows_common
