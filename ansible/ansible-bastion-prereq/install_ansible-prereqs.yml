---
########################################
## Install Ansible PreReqs on Bastion ##
########################################

- hosts: linux_bastion
  become: yes
  gather_facts: no
  tasks:

  - name: Add ansible ppa and update apt cache
    apt_repository:
      update_cache: yes
      repo: 'ppa:ansible/ansible'

  - name: Install Ansible
    apt:
      update_cache: yes
      name: ansible
  
  - name: Install Pip
    apt:
      update_cache: yes
      name: python3-pip

  - name: Install pywinrm for Ansible management of windows hosts
    pip: 
      name: pywinrm
      executable: pip

  - name: Install passlib for Ansible password hashing
    pip:
      name: passlib
      executable: pip

  - name: Install smbclient
    apt:
      name: smbclient
 
  - name: Install zip
    apt:
      name: zip

  - name: Install unzip
    apt:
      name: unzip

  - name: Install Kerberos Client
    apt:
      name: krb5-user

  - name: Transfer Kerberos Client Config
    copy:
      src: krb5.conf
      dest: /etc/krb5.conf