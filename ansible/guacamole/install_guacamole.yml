---
########################################
## Apache Guacamole RDP Gateway (Docker)
########################################
#
# Installs guacd + guacamole-client + Postgres in Docker.
# Configures two RDP connections out of the box: paw-1 and paw-2.
#
# Default admin: guacadmin / guacadmin (change on first login).
# Reachable on https://<guac>:8443 from corp/secops only (SG enforced).

- hosts: guacamole
  gather_facts: yes
  become: true
  vars:
    falcon_sensor_deb: ../common/files/falcon-sensor_7.07.0-16206_amd64.deb
    guac_dir: /opt/guacamole
    guac_pg_password: "guac-superuser-password-CHANGEME"
  tasks:

    - name: Set hostname
      hostname:
        name: guac

    - name: Install Docker prerequisites
      apt:
        update_cache: yes
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-docker
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Add Docker apt key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repo
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker engine
      apt:
        update_cache: yes
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Ensure Docker is running
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Create Guacamole directory
      file:
        path: "{{ guac_dir }}"
        state: directory
        mode: "0755"

    - name: Create Guacamole init directory
      file:
        path: "{{ guac_dir }}/init"
        state: directory
        mode: "0755"

    # Render Postgres init SQL from the official guacamole/guacamole image.
    # Guacamole 1.5.x uses --postgresql (the older --postgres alias was dropped).
    - name: Generate initdb.sql from the guacamole image
      shell: |
        docker run --rm guacamole/guacamole:1.5.5 /opt/guacamole/bin/initdb.sh --postgresql > {{ guac_dir }}/init/initdb.sql.tmp
        # Sanity-check: a real schema dump is many KB; an error message is < 1KB.
        if [ $(wc -c < {{ guac_dir }}/init/initdb.sql.tmp) -lt 1000 ]; then
          echo "initdb.sh produced an unexpectedly short file:" >&2
          cat {{ guac_dir }}/init/initdb.sql.tmp >&2
          rm -f {{ guac_dir }}/init/initdb.sql.tmp
          exit 1
        fi
        mv {{ guac_dir }}/init/initdb.sql.tmp {{ guac_dir }}/init/initdb.sql
      args:
        creates: "{{ guac_dir }}/init/initdb.sql"

    - name: Write docker-compose.yml
      copy:
        dest: "{{ guac_dir }}/docker-compose.yml"
        mode: "0644"
        content: |
          version: "3"
          services:
            postgres:
              image: postgres:13
              environment:
                POSTGRES_USER: guacamole_user
                POSTGRES_PASSWORD: "{{ guac_pg_password }}"
                POSTGRES_DB: guacamole_db
              volumes:
                - ./init:/docker-entrypoint-initdb.d:ro
                - pg_data:/var/lib/postgresql/data
              restart: unless-stopped

            guacd:
              image: guacamole/guacd:1.5.5
              restart: unless-stopped

            guacamole:
              image: guacamole/guacamole:1.5.5
              depends_on:
                - guacd
                - postgres
              environment:
                GUACD_HOSTNAME: guacd
                POSTGRES_HOSTNAME: postgres
                POSTGRES_DATABASE: guacamole_db
                POSTGRES_USER: guacamole_user
                POSTGRES_PASSWORD: "{{ guac_pg_password }}"
              ports:
                - "8080:8080"
              restart: unless-stopped

          volumes:
            pg_data: {}

    - name: Bring up Guacamole stack
      community.docker.docker_compose_v2:
        project_src: "{{ guac_dir }}"
        state: present
      ignore_errors: yes # community.docker may not be present on first run

    - name: Fallback -- bring up Guacamole stack via shell
      shell: docker compose up -d
      args:
        chdir: "{{ guac_dir }}"

    # Seed the two PAW RDP connections directly into Postgres.
    - name: Wait for guacamole_db to accept connections
      shell: |
        for i in $(seq 1 60); do
          docker exec $(docker ps -q -f name=postgres) pg_isready -U guacamole_user -d guacamole_db && exit 0
          sleep 2
        done
        exit 1
      changed_when: false

    - name: Seed PAW RDP connections in Guacamole DB
      shell: |
        docker exec -i $(docker ps -q -f name=postgres) psql -U guacamole_user -d guacamole_db <<SQL
        INSERT INTO guacamole_connection (connection_name, protocol)
          SELECT 'paw-1 (RDP)', 'rdp'
          WHERE NOT EXISTS (SELECT 1 FROM guacamole_connection WHERE connection_name='paw-1 (RDP)');
        INSERT INTO guacamole_connection (connection_name, protocol)
          SELECT 'paw-2 (RDP)', 'rdp'
          WHERE NOT EXISTS (SELECT 1 FROM guacamole_connection WHERE connection_name='paw-2 (RDP)');

        INSERT INTO guacamole_connection_parameter (connection_id, parameter_name, parameter_value)
          SELECT c.connection_id, p.name, p.value
          FROM guacamole_connection c, (VALUES
            ('hostname', '{{ paw_1_ip | default("10.0.4.10") }}'),
            ('port', '3389'),
            ('security', 'any'),
            ('ignore-cert', 'true')
          ) AS p(name, value)
          WHERE c.connection_name = 'paw-1 (RDP)'
            AND NOT EXISTS (
              SELECT 1 FROM guacamole_connection_parameter pp
              WHERE pp.connection_id = c.connection_id AND pp.parameter_name = p.name
            );

        INSERT INTO guacamole_connection_parameter (connection_id, parameter_name, parameter_value)
          SELECT c.connection_id, p.name, p.value
          FROM guacamole_connection c, (VALUES
            ('hostname', '{{ paw_2_ip | default("10.0.4.11") }}'),
            ('port', '3389'),
            ('security', 'any'),
            ('ignore-cert', 'true')
          ) AS p(name, value)
          WHERE c.connection_name = 'paw-2 (RDP)'
            AND NOT EXISTS (
              SELECT 1 FROM guacamole_connection_parameter pp
              WHERE pp.connection_id = c.connection_id AND pp.parameter_name = p.name
            );
        SQL
      changed_when: false

    - include_tasks: ../common/tasks/install_falcon_sensor.yml
